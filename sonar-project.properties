sonar.projectKey=stayngo
sonar.projectName=StayNGo
sonar.projectVersion=1.0

# Define what to analyze
sonar.sources=frontend,backend

# Exclude dependencies and cache from analysis
sonar.exclusions=**/node_modules/**, **/.next/**, **/.venv/**, **/__pycache__/**, **/tests/**

# (Optional) Provide paths to test coverage if you set them up later
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# sonar.python.coverage.reportPaths=backend/coverage.xml
